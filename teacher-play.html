<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Режим учителя - Викторина</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .quiz-title {
            font-size: 24px;
            font-weight: 700;
        }
        .question-counter {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 40px;
        }
        
        /* Main Screen */
        .presentation-screen {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 50px;
            text-align: center;
            margin-bottom: 30px;
        }
        .question-text {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 40px;
        }
        .answers-list {
            display: grid;
            gap: 15px;
            margin-bottom: 40px;
        }
        .answer-item {
            background: rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 20px 30px;
            font-size: 20px;
            text-align: left;
        }
        .answer-letter {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            margin-right: 15px;
            font-weight: 700;
        }
        .correct-answer {
            margin-top: 20px;
            padding: 15px;
            background: #10b981;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 600;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .control-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn.show {
            background: #f59e0b;
            color: white;
        }
        .control-btn.answer {
            background: #10b981;
            color: white;
        }
        .control-btn.next {
            background: #6366f1;
            color: white;
        }
        .control-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Players List */
        .players-section {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 25px;
            margin-top: 30px;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .player-card {
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
        }
        .player-name {
            font-weight: 700;
            margin-bottom: 8px;
        }
        .player-score {
            color: #ffd700;
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .presentation-screen { padding: 30px; }
            .question-text { font-size: 24px; }
            .answer-item { font-size: 16px; padding: 15px 20px; }
            .control-btn { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← На главную</a>
            <div class="quiz-title" id="quizTitle">Загрузка...</div>
            <div class="question-counter" id="questionCounter">Вопрос 0/0</div>
        </div>

        <div class="presentation-screen" id="presentationScreen">
            <div class="question-text" id="questionText">Вопрос появится здесь</div>
            <div class="answers-list" id="answersList"></div>
            <div id="correctAnswer" style="display: none;" class="correct-answer"></div>
        </div>

        <div class="controls">
            <button class="control-btn show" onclick="showQuestion()">📢 Показать вопрос</button>
            <button class="control-btn answer" onclick="showCorrectAnswer()">✅ Показать ответ</button>
            <button class="control-btn next" onclick="nextQuestion()">⏩ Следующий вопрос</button>
        </div>

        <div class="players-section">
            <h3><i class="fas fa-users"></i> Подключившиеся ученики</h3>
            <div id="playersList" class="players-grid">
                <div style="text-align:center; padding:20px;">Ожидание подключения...</div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('quiz');

        let quiz = null;
        let questions = [];
        let currentIndex = 0;
        let gameCode = null;
        let lobbyId = null;
        let players = {};

        async function init() {
            if (!quizId) {
                window.location.href = 'index.html';
                return;
            }
            
            const { data: quizData } = await sb.from('quizzes').select('*').eq('id', quizId).single();
            const { data: questionsData } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            
            quiz = quizData;
            questions = questionsData || [];
            
            document.getElementById('quizTitle').textContent = quiz?.title || 'Викторина';
            document.getElementById('questionCounter').textContent = `Вопрос 0/${questions.length}`;
            
            if (questions.length === 0) {
                document.getElementById('presentationScreen').innerHTML = '<div style="text-align:center; padding:50px;">❌ Нет вопросов в этой викторине</div>';
                return;
            }
            
            await createLobby();
            listenToLobby();
        }
        
        async function createLobby() {
            gameCode = Math.floor(10000000 + Math.random() * 90000000).toString();
            lobbyId = 'lobby_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
            
            await sb.from('lobbies').insert({
                id: lobbyId,
                quiz_id: quizId,
                code: gameCode,
                status: 'waiting',
                players: {},
                current_question: 0,
                created_at: new Date().toISOString()
            });
            
            document.getElementById('playersList').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <div style="font-size:48px; font-weight:800; letter-spacing:4px; margin-bottom:10px;">${gameCode}</div>
                    <div>Код игры для учеников</div>
                    <div style="margin-top:10px; font-size:14px;">Ожидание подключения...</div>
                </div>
            `;
        }
        
        function listenToLobby() {
            const channel = sb.channel('lobby-teacher-' + lobbyId);
            channel.on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'lobbies',
                filter: `id=eq.${lobbyId}`
            }, payload => {
                if (payload.new) {
                    players = payload.new.players || {};
                    updatePlayersList();
                }
            }).subscribe();
            
            sb.from('lobbies').select('*').eq('id', lobbyId).then(({ data }) => {
                if (data?.[0]) {
                    players = data[0].players || {};
                    updatePlayersList();
                }
            });
        }
        
        function updatePlayersList() {
            const container = document.getElementById('playersList');
            const playersArray = Object.values(players);
            
            if (playersArray.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <div style="font-size:32px; font-weight:800; letter-spacing:2px;">${gameCode}</div>
                        <div>Код игры</div>
                        <div style="margin-top:10px;">Ожидание учеников...</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = playersArray.map(p => `
                <div class="player-card">
                    <div class="player-name"><i class="fas fa-user"></i> ${escapeHtml(p.name)}</div>
                    <div class="player-score"><i class="fas fa-star"></i> ${p.score || 0}</div>
                </div>
            `).join('');
        }
        
        function showQuestion() {
            if (currentIndex >= questions.length) {
                alert('Викторина завершена!');
                return;
            }
            
            const q = questions[currentIndex];
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('questionCounter').textContent = `Вопрос ${currentIndex + 1}/${questions.length}`;
            document.getElementById('correctAnswer').style.display = 'none';
            
            // Показываем варианты
            const answersHtml = q.answers.map((ans, idx) => `
                <div class="answer-item">
                    <span class="answer-letter">${String.fromCharCode(65 + idx)}</span>
                    ${escapeHtml(ans)}
                </div>
            `).join('');
            document.getElementById('answersList').innerHTML = answersHtml;
            
            // Обновляем статус лобби
            sb.from('lobbies').update({ 
                status: 'active',
                current_question: currentIndex,
                question_text: q.question,
                question_answers: q.answers
            }).eq('id', lobbyId);
        }
        
        function showCorrectAnswer() {
            const q = questions[currentIndex];
            if (!q) return;
            
            const correctAnswerDiv = document.getElementById('correctAnswer');
            correctAnswerDiv.innerHTML = `<i class="fas fa-check-circle"></i> Правильный ответ: ${escapeHtml(q.answers[q.correct])}`;
            correctAnswerDiv.style.display = 'block';
        }
        
        async function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                // Завершаем викторину
                await sb.from('lobbies').update({ status: 'finished' }).eq('id', lobbyId);
                alert('🎉 Викторина завершена!');
                document.getElementById('presentationScreen').innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <div style="font-size:48px;">🏆</div>
                        <div style="font-size:24px; margin-top:20px;">Викторина завершена!</div>
                        <div style="margin-top:10px;">Спасибо за участие!</div>
                    </div>
                `;
                document.querySelector('.controls').style.display = 'none';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        init();
    </script>
</body>
</html>
